<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms JS</title>
    <style>
    .container { 
        padding: 0 50px;
    }
        input { 
            display: block; 
            margin-top: 5px; 
            padding: 8px; 
            background-color: rgb(243, 238, 229); 
            border-radius: 8px;
        }
        .error-message { 
            color: red; 
            font-size: 12px; 
            height: 15px; 
            margin-bottom: 10px; 
        }
        button {
            background-color: rgb(243, 238, 229); 
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="form-title">Sign in</h1>
        
        <form action="" method="post" style="padding: 20px 0">
            <div>
                <input type="text" name="username" placeholder="Имя пользователя" />
                <div class="username-error error-message"></div>
            </div>

            <div>
                <input type="email" name="email" placeholder="Email" />
                <div class="email-error error-message"></div>
            </div>

            <button type="submit">Send</button>
        </form>
    </div>
    <script src="main.js"></script>
</body>
</html>
